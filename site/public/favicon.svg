<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ah-planet" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#C7D2FE"/>
      <stop offset="40%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#2E1065"/>
    </radialGradient>
    <linearGradient id="ah-orbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Back half of ring (behind planet) -->
  <g transform="rotate(-16 256 256)">
    <path d="M 36 256 A 220 82 0 0 1 476 256" fill="none" stroke="url(#ah-orbit)" stroke-width="14" opacity="0.85" stroke-linecap="round"/>
  </g>

  <!-- Planet -->
  <circle cx="256" cy="256" r="118" fill="url(#ah-planet)"/>
  <ellipse cx="224" cy="218" rx="38" ry="22" fill="#E0E7FF" opacity="0.22"/>

  <!-- Front half of ring (in front of planet) -->
  <g transform="rotate(-16 256 256)">
    <path d="M 36 256 A 220 82 0 0 0 476 256" fill="none" stroke="url(#ah-orbit)" stroke-width="14" opacity="0.95" stroke-linecap="round"/>
  </g>
</svg>
