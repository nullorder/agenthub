name: Collect traffic stats

on:
  schedule:
    # Daily at 12:00 UTC. GitHub's Traffic API has a ~24h lag before the
    # previous day's bucket is finalized; earlier runs miss it.
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    # Traffic API requires Administration:read, which GITHUB_TOKEN cannot
    # be granted via workflow permissions. TRAFFIC_TOKEN is a fine-grained
    # PAT scoped to this repo with Administration:read + Metadata:read.
    env:
      GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch daily views and clones
        run: |
          set -euo pipefail
          mkdir -p stats/views stats/clones

          gh api "repos/${{ github.repository }}/traffic/views"  > /tmp/views.json
          gh api "repos/${{ github.repository }}/traffic/clones" > /tmp/clones.json

          jq -c '.views[]' /tmp/views.json | while read -r entry; do
            date=$(echo "$entry" | jq -r '.timestamp | split("T")[0]')
            echo "$entry" \
              | jq --arg d "$date" '{date: $d, count: .count, uniques: .uniques}' \
              > "stats/views/$date.json"
          done

          jq -c '.clones[]' /tmp/clones.json | while read -r entry; do
            date=$(echo "$entry" | jq -r '.timestamp | split("T")[0]')
            echo "$entry" \
              | jq --arg d "$date" '{date: $d, count: .count, uniques: .uniques}' \
              > "stats/clones/$date.json"
          done

      - name: Commit and push stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update traffic stats"
            git push
          fi
